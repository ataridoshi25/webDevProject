<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Personal Finance Dashboard Application" />
    <title>FinTrack | Secure Login</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header>
      <nav class="navbar">
        <div class="logo">FinTrack</div>
        <ul class="nav-links" id="navLinks"></ul>
      </nav>
    </header>

    <main class="auth-container">
      <section class="form-card">
        <h1>Welcome Back</h1>
        <p id="feedbackMessage" class="hidden"></p>
        <form id="loginForm" novalidate>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" required placeholder="name@example.com" />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required minlength="6" placeholder="••••••••" />
          </div>
          <button type="submit" class="btn">Sign In</button>
        </form>
      </section>
    </main>

    <script src="js/auth.js"></script>
  </body>
</html>
