<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Manage your personal budget and transactions tracking." />
    <title>FinTrack | Dashboard</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header>
      <nav class="navbar">
        <div class="logo">FinTrack</div>
        <ul class="nav-links" id="navLinks"></ul>
      </nav>
    </header>

    <main class="dashboard-container">
      <section class="summary-card">
        <h2>Current Status</h2>
        <div class="balance-box">
          <span>Total Balance:</span>
          <strong id="totalBalance">$0.00</strong>
        </div>
      </section>

      <section class="transaction-management">
        <div class="form-card">
          <h3>Add New Entry</h3>
          <form id="entryForm">
            <div class="form-group">
              <label for="desc">Description</label>
              <input type="text" id="desc" required placeholder="e.g., Groceries, Salary" />
            </div>
            <div class="form-group">
              <label for="amount">Amount (Negative for expenses)</label>
              <input type="number" id="amount" step="0.01" required placeholder="e.g., 250.00 or -45.50" />
            </div>
            <button type="submit" class="btn">Record Transaction</button>
          </form>
        </div>

        <div class="ledger-card">
          <h3>Transaction History</h3>
          <ul id="ledgerList" class="ledger-list"></ul>
        </div>
      </section>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
  </body>
</html>
