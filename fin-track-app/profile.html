<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Manage your personal account details and system preferences." />
    <title>FinTrack | My Profile</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header>
      <nav class="navbar">
        <div class="logo">FinTrack</div>
        <ul class="nav-links" id="navLinks"></ul>
      </nav>
    </header>

    <main class="profile-container">
      <section class="form-card">
        <h2>Account Profile</h2>
        <div id="profileDetails">
          <p><strong>Account Tier:</strong> <span id="userTier">Loading...</span></p>
          <p><strong>Registered Email:</strong> <span id="userEmail">Loading...</span></p>
        </div>
      </section>
    </main>

    <script src="js/auth.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const userSession = JSON.parse(localStorage.getItem("userSession"));
        if (userSession) {
          document.getElementById("userEmail").textContent = userSession.email;
          document.getElementById("userTier").textContent = userSession.role.replace("_", " ").toUpperCase();
        } else {
          document.getElementById("profileDetails").innerHTML = "<p class='error'>Access Denied. Please log in.</p>";
        }
      });
    </script>
  </body>
</html>
